          service-host-type: IP # 娉ㄥ唽瀹炰緥鏃讹紝浼樺厛浣跨敤 IP [IP, HOST_NAME, CANONICAL_HOST_NAME]
      # Spring Boot Admin Server 鏈嶅姟绔殑鐩稿叧閰嶇疆
      context-path: /admin # 閰嶇疆 Spring

# 鏃ュ織鏂囦欢閰嶇疆
