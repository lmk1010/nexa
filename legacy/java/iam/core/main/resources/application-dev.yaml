--- #################### 鏁版嵁搴撶浉鍏抽厤缃?####################
spring:
  # 鏁版嵁婧愰厤缃」
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure # 鎺掗櫎 Druid 鐨勮嚜鍔ㄩ厤缃紝浣跨敤 dynamic-datasource-spring-boot-starter 閰嶇疆澶氭暟鎹簮
  datasource:
    druid: # Druid 銆愮洃鎺с€戠浉鍏崇殑鍏ㄥ眬閰嶇疆
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: false # 鐢熶骇鐜鍏抽棴 Druid 鐩戞帶椤甸潰
        allow: # 璁剧疆鐧藉悕鍗曪紝涓嶅～鍒欏厑璁告墍鏈夎闂?
        url-pattern: /druid/*
        login-username: admin # 鎺у埗鍙扮鐞嗙敤鎴峰悕鍜屽瘑鐮?
        login-password: druid123456
      filter:
        stat:
          enabled: true
          log-slow-sql: true # 鎱?SQL 璁板綍
          slow-sql-millis: 2000 # 鐢熶骇鐜鎱QL闃堝€艰皟楂?
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic: # 澶氭暟鎹簮閰嶇疆
      druid: # Druid 銆愯繛鎺ユ睜銆戠浉鍏崇殑鍏ㄥ眬閰嶇疆
        initial-size: 10 # 鍒濆杩炴帴鏁?
        min-idle: 20 # 鏈€灏忚繛鎺ユ睜鏁伴噺
        max-active: 50 # 鏈€澶ц繛鎺ユ睜鏁伴噺
        max-wait: 600000 # 閰嶇疆鑾峰彇杩炴帴绛夊緟瓒呮椂鐨勬椂闂达紝鍗曚綅锛氭绉?
        time-between-eviction-runs-millis: 60000 # 閰嶇疆闂撮殧澶氫箙鎵嶈繘琛屼竴娆℃娴嬶紝妫€娴嬮渶瑕佸叧闂殑绌洪棽杩炴帴锛屽崟浣嶏細姣
        min-evictable-idle-time-millis: 300000 # 閰嶇疆涓€涓繛鎺ュ湪姹犱腑鏈€灏忕敓瀛樼殑鏃堕棿锛屽崟浣嶏細姣
        max-evictable-idle-time-millis: 900000 # 閰嶇疆涓€涓繛鎺ュ湪姹犱腑鏈€澶х敓瀛樼殑鏃堕棿锛屽崟浣嶏細姣
        validation-query: SELECT 1 FROM DUAL # 閰嶇疆妫€娴嬭繛鎺ユ槸鍚︽湁鏁?
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
      primary: master
      datasource:
        master:
          url: jdbc:mysql://192.168.10.253:3306/kyx_oa?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true # MySQL 鐢熶骇鐜杩炴帴
          username: kyx_user
          password: kyx123456
        slave: # 浠庡簱閰嶇疆
          lazy: true # 寮€鍚噿鍔犺浇锛屼繚璇佸惎鍔ㄩ€熷害
          url: jdbc:mysql://192.168.10.253:3307/kyx_oa?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true # MySQL 浠庡簱杩炴帴
          username: kyx_user
          password: kyx123456

  # Redis 閰嶇疆銆俁edisson 榛樿鐨勯厤缃冻澶熶娇鐢紝涓€鑸笉闇€瑕佽繘琛岃皟浼?
  redis:
    host: 192.168.10.253 # Redis 鍦板潃
    port: 6379 # 绔彛
    database: 1 # 鏁版嵁搴撶储寮?
    password: kyx_redis_2024 # Redis 瀵嗙爜
    timeout: 6000ms # 杩炴帴瓒呮椂鏃堕棿
    lettuce:
      pool:
        max-active: 20 # 杩炴帴姹犳渶澶ц繛鎺ユ暟
        max-wait: -1ms # 杩炴帴姹犳渶澶ч樆濉炵瓑寰呮椂闂?
        max-idle: 8 # 杩炴帴姹犳渶澶х┖闂茶繛鎺ユ暟
        min-idle: 2 # 杩炴帴姹犳渶灏忕┖闂茶繛鎺ユ暟

