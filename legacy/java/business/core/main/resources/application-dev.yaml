---

spring:
  cloud:
    nacos:
      server-addr: 192.168.10.253:8848
      username: nacos
      password: nacos
      discovery:
        namespace: mk-dev
        group: DEFAULT_GROUP
        metadata:
          version: 1.0.0
      config:
        namespace: mk-dev
        group: DEFAULT_GROUP

---
spring:
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: false
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      druid:
        initial-size: 10
        min-idle: 20
        max-active: 50
        max-wait: 600000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        max-evictable-idle-time-millis: 900000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
      primary: master
      datasource:
        master:
          url: jdbc:mysql://192.168.10.253:3306/kyx_oa?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: kyx_user
          password: kyx123456
        slave:
          lazy: true
          url: jdbc:mysql://192.168.10.253:3307/kyx_oa?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: kyx_user
          password: kyx123456
        ordersys:
          lazy: true
          url: jdbc:mysql://${ORDERSYS_MYSQL_HOST:192.168.10.253}:${ORDERSYS_MYSQL_PORT:3306}/${ORDERSYS_MYSQL_DATABASE:order-sys}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${ORDERSYS_MYSQL_USERNAME:kyx_user}
          password: ${ORDERSYS_MYSQL_PASSWORD:kyx123456}

  redis:
    host: 192.168.10.253
    port: 6379
    database: 1
    password: kyx_redis_2024
    timeout: 6000ms
    lettuce:
      pool:
        max-active: 20
        max-wait: -1ms
        max-idle: 8
        min-idle: 2

---

rocketmq:
  name-server: 192.168.10.253:9092

spring:
  kafka:
    bootstrap-servers: 192.168.10.253:9092

---


management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: 'health,info,metrics'

logging:
  level:
    root: INFO
    com.kyx: INFO
  file:
    name: ${LOG_PATH:/app/logs}/${spring.application.name}.log # 鏀寔鐜鍙橀噺锛孌ocker榛樿浣跨敤/app/logs
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

