---

spring:
  cloud:
    nacos:
      server-addr: localhost:8848
      username: nacos
      password: nacos
      discovery:
        namespace: local
        group: DEFAULT_GROUP
        metadata:
          version: 1.0.0
      config:
        namespace: local
        group: DEFAULT_GROUP

---
spring:
  autoconfigure:
    exclude:
      - de.codecentric.boot.admin.client.config.SpringBootAdminClientAutoConfiguration
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        allow:
        url-pattern: /druid/*
        login-username:
        login-password:
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 100
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      druid:
        initial-size: 1
        min-idle: 1
        max-active: 20
        max-wait: 600000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        max-evictable-idle-time-millis: 900000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
      primary: master
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/kyx_oa?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: kyx_user
          password: kyx123456
        slave:
          lazy: true
          url: jdbc:mysql://localhost:3306/kyx_oa?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: kyx_user
          password: kyx123456
        ordersys:
          lazy: true
          url: jdbc:mysql://${ORDERSYS_MYSQL_HOST:localhost}:${ORDERSYS_MYSQL_PORT:3306}/${ORDERSYS_MYSQL_DATABASE:order-sys}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${ORDERSYS_MYSQL_USERNAME:kyx_user}
          password: ${ORDERSYS_MYSQL_PASSWORD:kyx123456}


  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    password: kyx_redis_2024

---

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: '*'
    listener:
      missing-topics-fatal: false

---

lock4j:
  acquire-timeout: 3000
  expire: 30000

---

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: '*'

spring:
  boot:
    admin:
      client:
        instance:
          service-host-type: IP

logging:
  file:
    name: ./logs/${spring.application.name}.log # 本地环境使用相对路径
  level:
    com.kyx.service.erp.dal.mysql: debug
    org.springframework.context.support.PostProcessorRegistrationDelegate: ERROR

---

foundation:
  env:
    tag: ${HOSTNAME}
  security:
    mock-enable: true
  access-log:
    enable: false
