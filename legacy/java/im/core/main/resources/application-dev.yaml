--- #################### 鐩戞帶鐩稿叧閰嶇疆 ####################

# Actuator 鐩戞帶绔偣鐨勯厤缃」
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: 'health,info,metrics' # 鐢熶骇鐜鍙紑鏀惧繀瑕佺殑绔偣

# 鏃ュ織鏂囦欢閰嶇疆
logging:
  level:
    root: INFO # 鐢熶骇鐜鏃ュ織绾у埆
    com.kyx: INFO
  file:
    name: /app/logs/${spring.application.name}.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

