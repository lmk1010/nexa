---

spring:
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:192.168.10.253}:${NACOS_PORT:8848}
      username: nacos
      password: nacos
      discovery:
        namespace: mk-dev
        group: DEFAULT_GROUP
        metadata:
          version: 1.0.0
      config:
        namespace: mk-dev
        group: DEFAULT_GROUP

---
spring:

  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure
  datasource:
    druid:
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: false
        allow:
        url-pattern: /druid/*
        login-username: admin
        login-password: druid123456
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic:
      druid:
        initial-size: 10
        min-idle: 20
        max-active: 50
        max-wait: 600000
        time-between-eviction-runs-millis: 60000
        min-evictable-idle-time-millis: 300000
        max-evictable-idle-time-millis: 900000
        validation-query: SELECT 1 FROM DUAL
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:192.168.10.253}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:kyx_oa}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${MYSQL_USERNAME:kyx_user}
          password: ${MYSQL_PASSWORD:kyx123456}
        slave:
          lazy: true
          url: jdbc:mysql://${MYSQL_SLAVE_HOST:192.168.10.253}:${MYSQL_SLAVE_PORT:3306}/${MYSQL_DATABASE:kyx_oa}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true
          username: ${MYSQL_USERNAME:kyx_user}
          password: ${MYSQL_PASSWORD:kyx123456}


  redis:
    host: ${REDIS_HOST:192.168.10.253}
    port: ${REDIS_PORT:6379}
    database: ${REDIS_DATABASE:1}
    password: ${REDIS_PASSWORD:kyx_redis_2024}
    timeout: 6000ms
    lettuce:
      pool:
        max-active: 20
        max-wait: -1ms
        max-idle: 8
        min-idle: 2

---

rocketmq:
  name-server: 192.168.10.253:9092

spring:

  rabbitmq:
    host: 192.168.10.253
    port: 5672
    username: guest
    password: guest

  kafka:
    bootstrap-servers: 192.168.10.253:9092

    producer:
      acks: 1
      retries: 3
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:

        connections.max.idle.ms: 60000
        request.timeout.ms: 10000

        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 10000
        retry.backoff.ms: 1000

    consumer:
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: true
      auto-commit-interval: 5000
      max-poll-records: 50
      properties:
        spring.json.trusted.packages: '*'

        connections.max.idle.ms: 120000
        session.timeout.ms: 60000
        heartbeat.interval.ms: 10000
        request.timeout.ms: 30000

        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 10000
        retry.backoff.ms: 1000

    listener:
      missing-topics-fatal: false
      type: batch
      concurrency: 1
---

---

lock4j:
  acquire-timeout: 3000
  expire: 30000

---

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: 'health,info,metrics'

spring:
  boot:
    admin:

      client:
        instance:
          service-host-type: IP

      context-path: /admin

logging:
  level:
    root: INFO
    com.kyx: INFO
    org.springframework.security: WARN
  file:
    name: ${LOG_PATH:/app/logs}/${spring.application.name}.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

