    version: 1.0.0
    base-package: com.kyx.service.hr
  web:
    admin-ui:
      url: http://dashboard.foundation.iocoder.cn # Admin 管理后台 UI 的地址
  xss:
    enable: false
    exclude-urls: # 如下 url，仅仅是为了演示，去掉配置也没关系
      - ${management.endpoints.web.base-path}/** # 不处理 Actuator 的请求
  swagger:
    title: HR模块
    description: 提供HR管理的所有功能
    version: ${foundation.info.version}
  tenant: # 多租户相关配置项
    enable: true
    ignore-urls:
      - /admin-api/system/tenant/get-user-tenant-list # 获取用户绑定的租户信息接口，不需要校验租户
      - /admin-api/system/tenant/page
      - /admin-api/hr/public/** # 公开问卷接口，租户从token中获取
    ignore-visit-urls:
      - /admin-api/system/user/profile/**
      - /admin-api/system/auth/**
    ignore-tables:
      # system_tenant 是租户主表，没有 tenant_id 列；JOIN 时拦截器不能再拼 st.tenant_id
      - system_tenant
    ignore-caches:
      - user_role_ids
      - permission_menu_ids
      - oauth_client
      - notify_template
      - mail_account
      - mail_template
      - sms_template
  sms-code: # 短信验证码相关的配置项
    expire-times: 10m
    send-frequency: 1m
    send-maximum-quantity-per-day: 10
    begin-code: 9999 # 这里配置 9999 的原因是，测试方便。
    end-code: 9999 # 这里配置 9999 的原因是，测试方便。

