      client-id: ${DINGTALK_CLIENT_ID:dingvrnreaje3yqvzhxg}
      client-secret: ${DINGTALK_CLIENT_SECRET:i8E6iZyDvZj51JIb0tYsYfVQYOks9Cq1lgryEjFRqC79P3iJcrxEwT6Qk2QvLrLI}
      ignore-check-redirect-uri: true
    WECHAT_ENTERPRISE: # 企业微信
      client-id: ${WECHAT_ENTERPRISE_CLIENT_ID:wwd411c69a39ad2e54}
      client-secret: ${WECHAT_ENTERPRISE_CLIENT_SECRET:1wTb7hYxnpT2TUbIeHGXGo7T0odav1ic10mLdyyATOw}
