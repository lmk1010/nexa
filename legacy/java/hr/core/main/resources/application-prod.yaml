--- #################### 注册中心 + 配置中心相关配置 ####################

spring:
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:172.16.0.15}:${NACOS_PORT:8848} # Nacos 服务器地址，支持环境变量
      username: nacos # Nacos 账号
      password: nacos # Nacos 密码
      discovery: # 【服务注册】配置项
        namespace: prod # 命名空间。这里使用 prod 生产环境
        group: DEFAULT_GROUP # 使用的 Nacos 配置分组，默认为 DEFAULT_GROUP
        metadata:
          version: 1.0.0 # 服务实例的版本号，可用于灰度发布
      config: # 【配置中心】配置项
        namespace: prod # 命名空间。这里使用 prod 生产环境
        group: DEFAULT_GROUP # 使用的 Nacos 配置分组，默认为 DEFAULT_GROUP

--- #################### 数据库相关配置 ####################
spring:
  # 数据源配置项
  autoconfigure:
    exclude:
      - com.alibaba.druid.spring.boot.autoconfigure.DruidDataSourceAutoConfigure # 排除 Druid 的自动配置，使用 dynamic-datasource-spring-boot-starter 配置多数据源
  datasource:
    druid: # Druid 【监控】相关的全局配置
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: false # 生产环境关闭 Druid 监控页面
        allow: # 设置白名单，不填则允许所有访问
        url-pattern: /druid/*
        login-username: admin # 控制台管理用户名和密码
        login-password: druid123456
      filter:
        stat:
          enabled: true
          log-slow-sql: true # 慢 SQL 记录
          slow-sql-millis: 2000 # 生产环境慢SQL阈值调高
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true
    dynamic: # 多数据源配置
      druid: # Druid 【连接池】相关的全局配置
        initial-size: 10 # 初始连接数
        min-idle: 20 # 最小连接池数量
        max-active: 50 # 最大连接池数量
        max-wait: 600000 # 配置获取连接等待超时的时间，单位：毫秒
        time-between-eviction-runs-millis: 60000 # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位：毫秒
        min-evictable-idle-time-millis: 300000 # 配置一个连接在池中最小生存的时间，单位：毫秒
        max-evictable-idle-time-millis: 900000 # 配置一个连接在池中最大生存的时间，单位：毫秒
        validation-query: SELECT 1 FROM DUAL # 配置检测连接是否有效
        test-while-idle: true
        test-on-borrow: false
        test-on-return: false
      primary: master
      datasource:
        master:
          url: jdbc:mysql://${MYSQL_HOST:172.16.0.15}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:kyx_oa}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true&rewriteBatchedStatements=true # MySQL 生产环境连接，支持环境变量
          username: ${MYSQL_USERNAME:kyx_user}
          password: ${MYSQL_PASSWORD:kyx123456}

  # Redis 配置。Redisson 默认的配置足够使用，一般不需要进行调优
  redis:
    host: ${REDIS_HOST:172.16.0.15} # Redis 地址，支持环境变量
    port: ${REDIS_PORT:6379} # 端口
    database: ${REDIS_DATABASE:1} # 数据库索引
    password: ${REDIS_PASSWORD:kyx_redis_2024} # Redis 密码
    timeout: 6000ms # 连接超时时间
    lettuce:
      pool:
        max-active: 20 # 连接池最大连接数
        max-wait: -1ms # 连接池最大阻塞等待时间
        max-idle: 8 # 连接池最大空闲连接数
        min-idle: 2 # 连接池最小空闲连接数

--- #################### MQ 消息队列相关配置 ####################

# rocketmq 配置项，对应 RocketMQProperties 配置类
rocketmq:
  name-server: kafka:9092 # RocketMQ Namesrv (使用Kafka替代)

spring:
  # RabbitMQ 配置项，对应 RabbitProperties 配置类
  rabbitmq:
    host: rabbitmq # RabbitMQ 服务的地址
    port: 5672 # RabbitMQ 服务的端口
    username: guest # RabbitMQ 服务的账号
    password: guest # RabbitMQ 服务的密码
  # Kafka 配置项，对应 KafkaProperties 配置类
  kafka:
    bootstrap-servers: kafka:9092 # 指定 Kafka Broker 地址

--- #################### 定时任务相关配置 ####################
# 使用Spring自带的@Scheduled注解进行定时任务

--- #################### 服务保障相关配置 ####################

# Lock4j 配置项
lock4j:
  acquire-timeout: 3000 # 获取分布式锁超时时间，默认为 3000 毫秒
  expire: 30000 # 分布式锁的超时时间，默认为 30 毫秒

# Feign RPC 配置：AI 判分可能等待模型返回，默认超时太短会导致 HR 提前判失败
feign:
  client:
    config:
      ai-server:
        connectTimeout: 10000
        readTimeout: 180000

--- #################### 监控相关配置 ####################

# Actuator 监控端点的配置项
management:
  endpoints:
    web:
      base-path: /actuator # Actuator 提供的 API 接口的根目录。默认为 /actuator
      exposure:
        include: 'health,info,metrics' # 生产环境只开放必要的端点

# Spring Boot Admin 配置项
spring:
  boot:
    admin:
      # Spring Boot Admin Client 客户端的相关配置
      client:
        instance:
          service-host-type: IP # 注册实例时，优先使用 IP [IP, HOST_NAME, CANONICAL_HOST_NAME]
      # Spring Boot Admin Server 服务端的相关配置
      context-path: /admin # 配置 Spring

# 日志文件配置
logging:
  level:
    root: INFO # 生产环境日志级别
    com.kyx: INFO
    org.springframework.security: WARN
  file:
    name: ${LOG_PATH:/app/logs}/${spring.application.name}.log # 支持环境变量，Docker默认使用/app/logs
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

--- #################### 微信公众号、小程序相关配置 ####################
wx:
  mp: # 公众号配置（生产环境）
    app-id: ${WX_MP_APP_ID:wx041349c6f39b268b} # 从环境变量获取
    secret: ${WX_MP_SECRET:5abee519483bc9f8cb37ce280e814bd0}
