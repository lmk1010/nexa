# nexa-cdc-mysql example config
# Copy to config.yaml and fill secrets. Never commit real passwords.

http:
  addr: ":48093"

server_id: 19001
flavor: mysql

source:
  host: 127.0.0.1
  port: 3306
  user: cdc_repl
  password: "CHANGE_ME"
  charset: utf8mb4

sink:
  # warehouse write DSN (cdc user only)
  dsn: "cdc:CHANGE_ME@tcp(127.0.0.1:3306)/ordersys_dw?parseTime=true&loc=Local&charset=utf8mb4"
  batch_size: 200
  flush_interval: 2s

store:
  driver: memory   # memory | mysql (mysql TODO)
  channel: ordersys-default
  # dsn: "..."     # when driver=mysql

# Safe default: must list tables explicitly (deny-all if empty).
# Align with docs/design/flexible-data-delivery-plan.md / ordersys-oa-dashboard-data-plan.md
include_tables:
  - ordersys.t_task
  - ordersys.t_order_pf
  - ordersys.t_order_pf_seller
  - ordersys.t_order_revoke
  - ordersys.sys_user
  - ordersys.sys_dept
  # pending:
  # - ordersys.t_order
  # - ordersys.t_order_detail
  # - ordersys.t_work_order
  # - ordersys.t_work_order_timeout
